version: '3.8'

services:
  rss-mcp:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-rss}
      - DEPLOYMENT=${DEPLOYMENT:-streamable-http}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - DEFAULT_FETCH_INTERVAL=${DEFAULT_FETCH_INTERVAL:-300}
      - ENABLE_CONTENT_EXTRACTION=${ENABLE_CONTENT_EXTRACTION:-true}
      - PRODUCTION_MODE=${PRODUCTION_MODE:-false}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-rss}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
